services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lalela
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lalela123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO AIStor (S3-compatible object storage) ─────────────────────────────
  minio:
    image: quay.io/minio/aistor/minio:latest
    restart: unless-stopped
    command: minio server /mnt/data --console-address ":9001" --license /minio.license
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-lalela}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-lalela123}
    volumes:
      - minio_data:/mnt/data
      - ./minio.license:/minio.license:ro
    ports:
      - '9000:9000'              # API — direct, no nginx
      - '127.0.0.1:19001:9001'  # Console — nginx proxies 9001→127.0.0.1:19001
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── MinIO bucket init (runs once, creates bucket + app user) ───────────────
  minio-init:
    image: minio/mc:latest
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-lalela}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-lalela123}
      MINIO_APP_USER: ${MINIO_ACCESS_KEY:-lalela}
      MINIO_APP_PASSWORD: ${MINIO_SECRET_KEY:-lalela123}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/lalela;
        mc anonymous set download local/lalela;
        mc admin user add local $$MINIO_APP_USER $$MINIO_APP_PASSWORD || true;
        mc admin policy attach local readwrite --user $$MINIO_APP_USER || true;
        echo 'MinIO init complete';
      "

  # ── Lalela backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:lalela123@postgres:5432/lalela
      PORT: 4000
    env_file:
      - .env
    ports:
      - '4000:4000'

  # ── pgAdmin (database monitoring) ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lalela.net
      PGADMIN_DEFAULT_PASSWORD: lalela123
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── TURN server (WebRTC) ────────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: -c /etc/coturn/turnserver.conf

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
