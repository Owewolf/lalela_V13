worker_processes auto;

user wolf;

events {
    worker_connections 1024;
}

error_log /usr/local/nginx/logs/error.log warn;

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 500m;        # Increased for image/video uploads

    # -----------------------------
    # DEFAULT SERVER (PORT 80)
    # -----------------------------
    server {
        listen 80;
        server_name 192.168.31.96 _;   # Catch-all

        # Redirect to main app (you can change to HTTPS later)
        return 301 http://$host:3030$request_uri;
    }

    # -----------------------------
    # 🔥 LALELA MAIN APP + SOCKET.IO (PORT 3030)
    # -----------------------------
    server {
        listen 3030;
        server_name 192.168.31.96;

        # Proxy to your new Node.js + Socket.io backend
        location / {
            proxy_pass http://127.0.0.1:4000;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket Support (Critical for Socket.io + WebRTC)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # -----------------------------
    # MINIO - Object Storage (S3 Replacement)
    # -----------------------------
    server {
        listen 9000;
        server_name 192.168.31.96;

        location / {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 500m;
            proxy_request_buffering off;
        }
    }

    # MinIO Console (Web UI)
    server {
        listen 9001;
        server_name 192.168.31.96;

        location / {
            proxy_pass http://127.0.0.1:9001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # -----------------------------
    # INVOICEPLANE (Existing)
    # -----------------------------
    server {
        listen 8666;
        server_name 192.168.31.96;

        root /usr/local/nginx/html/ip;
        index index.php index.html index.htm;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/run/php-fpm/www.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }

    # -----------------------------
    # HLS STREAMING (Existing)
    # -----------------------------
    server {
        listen 8080;
        server_name 192.168.31.96;

        location /dji/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /home/wolf/Videos/Dji/hls/;
            add_header Cache-Control no-cache;
            autoindex on;
        }

        location /camera/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /home/wolf/Videos/Camera/hls/;
            add_header Cache-Control no-cache;
            autoindex on;
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}

# -----------------------------
# RTMP CONFIG (Existing)
# -----------------------------
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application dji {
            live on;
            allow publish all;
            allow play all;

            record all;
            record_path /home/wolf/Videos/Dji;
            record_max_size 64M;
            record_unique on;
            record_suffix -%Y-%m-%d-%H-%M.mp4;
            record_append on;
            record_interval 5m;

            hls on;
            hls_path /home/wolf/Videos/Dji/hls;
            hls_fragment 8s;
            hls_playlist_length 20m;
            hls_sync 100ms;
            hls_fragment_naming system;
            hls_cleanup off;
        }

        application camera {
            live on;
            allow publish all;
            allow play all;

            record all;
            record_path /home/wolf/Videos/Camera;
            record_max_size 64M;
            record_unique on;
            record_suffix -%Y-%m-%d-%H-%M.mp4;
            record_append on;
            record_interval 5m;

            hls on;
            hls_path /home/wolf/Videos/Camera/hls;
            hls_fragment 8s;
            hls_playlist_length 10m;
            hls_cleanup on;
        }
    }
}
