name: Theme Guard

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  hardcoded-color-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Theme Guard
        run: npm run lint:theme-guard
