# ─── Lalela nginx reverse proxy ────────────────────────────────────────────────
# Drop this into /etc/nginx/sites-available/lalela.net and symlink to sites-enabled.
#
# Prerequisites:
#   - SSL cert at /etc/letsencrypt/live/lalela.net/  (certbot)
#   - Backend running on 127.0.0.1:3001
#   - MinIO running on 127.0.0.1:9000

upstream backend {
    server 127.0.0.1:4000;
    keepalive 64;
}

upstream minio {
    server 127.0.0.1:9000;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name lalela.net www.lalela.net storage.lalela.net;
    return 301 https://$host$request_uri;
}

# ── Main app (lalela.net) ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lalela.net www.lalela.net;

    ssl_certificate     /etc/letsencrypt/live/lalela.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lalela.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 25M;

    # ── API + WebSocket ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://backend/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;   # keep WebSocket alive
        proxy_send_timeout  86400s;
    }

    # ── Socket.io (long-poll fallback) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass          http://backend/socket.io/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Static landing page ────────────────────────────────────────────────
    location / {
        root  /var/www/lalela/public;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# ── MinIO object storage (storage.lalela.net) ───────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name storage.lalela.net;

    ssl_certificate     /etc/letsencrypt/live/lalela.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lalela.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 100M;

    location / {
        proxy_pass          http://minio/;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout          300s;
    }
}
